              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: OK
        for: 0s
        annotations:
          summary: "Tentatives de connexion suspectes (>10 en 5 min)"
          description: "Plus de 10 tentatives de connexion échouées détectées en 5 minutes — possible attaque par force brute."
        labels:
          severity: warning
        isPaused: false
        notificationSettings:
          receiver: email

