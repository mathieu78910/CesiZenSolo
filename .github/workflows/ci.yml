name: CI — Intégration Continue

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1 : Tests & vérification de type du backend (Node/TypeScript)
  # ──────────────────────────────────────────────────────────────
  test-api:
    name: API — Tests & TypeCheck
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v6

      - name: Configurer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: back/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: back

      - name: Audit de sécurité (npm audit)
        working-directory: back
        # --omit=dev : on n'audite que les dépendances de production
        # (devDependencies = outillage de build, non livré).
        run: |
          AUDIT=$(npm audit --omit=dev --json || true)
          CRITICAL=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.critical')
          HIGH=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.high')
          MODERATE=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.moderate')
          LOW=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.low')

          {
            echo "### 🛡️ Audit de sécurité — back"
            echo ""
            echo "| Sévérité | Nombre |"
            echo "|---|---|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Moderate | $MODERATE |"
            echo "| 🟢 Low | $LOW |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "🔴 Critical: $CRITICAL  🟠 High: $HIGH  🟡 Moderate: $MODERATE  🟢 Low: $LOW"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Vulnérabilité(s) high/critical détectée(s) — build bloqué (npm audit)"
            exit 1
          fi

      - name: Générer le client Prisma
        run: npx prisma generate
        working-directory: back

      - name: Vérification des types TypeScript
        run: npm run typecheck
        working-directory: back

      - name: Lancer les tests unitaires
        run: npm test
        working-directory: back

  # ──────────────────────────────────────────────────────────────
  # Job 2 : Build de vérification du frontend (React/Vite)
  # ──────────────────────────────────────────────────────────────
  build-web:
    name: Web — Build de vérification
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v6

      - name: Configurer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Installer le client API partagé
        run: npm ci
        working-directory: cesizen-api

      - name: Audit de sécurité (npm audit) — cesizen-api
        working-directory: cesizen-api
        run: |
          AUDIT=$(npm audit --omit=dev --json || true)
          CRITICAL=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.critical')
          HIGH=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.high')
          MODERATE=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.moderate')
          LOW=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.low')

          {
            echo "### 🛡️ Audit de sécurité — cesizen-api"
            echo ""
            echo "| Sévérité | Nombre |"
            echo "|---|---|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Moderate | $MODERATE |"
            echo "| 🟢 Low | $LOW |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "🔴 Critical: $CRITICAL  🟠 High: $HIGH  🟡 Moderate: $MODERATE  🟢 Low: $LOW"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Vulnérabilité(s) high/critical détectée(s) — build bloqué (npm audit)"
            exit 1
          fi

      - name: Installer les dépendances frontend
        run: npm ci
        working-directory: web

      - name: Audit de sécurité (npm audit) — web
        working-directory: web
        run: |
          AUDIT=$(npm audit --omit=dev --json || true)
          CRITICAL=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.critical')
          HIGH=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.high')
          MODERATE=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.moderate')
          LOW=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.low')

          {
            echo "### 🛡️ Audit de sécurité — web"
            echo ""
            echo "| Sévérité | Nombre |"
            echo "|---|---|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Moderate | $MODERATE |"
            echo "| 🟢 Low | $LOW |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "🔴 Critical: $CRITICAL  🟠 High: $HIGH  🟡 Moderate: $MODERATE  🟢 Low: $LOW"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Vulnérabilité(s) high/critical détectée(s) — build bloqué (npm audit)"
            exit 1
          fi

      - name: Compiler le frontend
        run: npm run build
        working-directory: web
        env:
          # URL de l'API en staging (pas d'URL de prod exposée en CI)
          VITE_API_URL: https://cesizen-staging.example.com
