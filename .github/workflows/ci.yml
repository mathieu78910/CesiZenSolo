name: CI/CD — Intégration & Déploiement Continu

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/cesizen-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/cesizen-web

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1 : Tests & vérification de type du backend (Node/TypeScript)
  # ──────────────────────────────────────────────────────────────
  test-api:
    name: API — Tests & TypeCheck
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v7

      - name: Configurer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: back/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: back

      - name: Audit de sécurité (npm audit)
        working-directory: back
        run: |
          AUDIT=$(npm audit --omit=dev --json || true)
          CRITICAL=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.critical')
          HIGH=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.high')
          MODERATE=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.moderate')
          LOW=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.low')

          {
            echo "### 🛡️ Audit de sécurité — back"
            echo ""
            echo "| Sévérité | Nombre |"
            echo "|---|---|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Moderate | $MODERATE |"
            echo "| 🟢 Low | $LOW |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Vulnérabilité(s) high/critical détectée(s) — build bloqué (npm audit)"
            exit 1
          fi

      - name: Générer le client Prisma
        run: npx prisma generate
        working-directory: back

      - name: Vérification des types TypeScript
        run: npm run typecheck
        working-directory: back

      - name: Lancer les tests unitaires
        run: npm test
        working-directory: back

  # ──────────────────────────────────────────────────────────────
  # Job 2 : Build de vérification du frontend (React/Vite)
  # ──────────────────────────────────────────────────────────────
  build-web:
    name: Web — Build de vérification
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v7

      - name: Configurer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Installer le client API partagé
        run: npm ci
        working-directory: cesizen-api

      - name: Audit de sécurité (npm audit) — cesizen-api
        working-directory: cesizen-api
        run: |
          AUDIT=$(npm audit --omit=dev --json || true)
          CRITICAL=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.critical')
          HIGH=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.high')
          MODERATE=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.moderate')
          LOW=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.low')

          {
            echo "### 🛡️ Audit de sécurité — cesizen-api"
            echo ""
            echo "| Sévérité | Nombre |"
            echo "|---|---|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Moderate | $MODERATE |"
            echo "| 🟢 Low | $LOW |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Vulnérabilité(s) high/critical détectée(s) — build bloqué (npm audit)"
            exit 1
          fi

      - name: Installer les dépendances frontend
        run: npm ci
        working-directory: web

      - name: Audit de sécurité (npm audit) — web
        working-directory: web
        run: |
          AUDIT=$(npm audit --omit=dev --json || true)
          CRITICAL=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.critical')
          HIGH=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.high')
          MODERATE=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.moderate')
          LOW=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.low')

          {
            echo "### 🛡️ Audit de sécurité — web"
            echo ""
            echo "| Sévérité | Nombre |"
            echo "|---|---|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Moderate | $MODERATE |"
            echo "| 🟢 Low | $LOW |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Vulnérabilité(s) high/critical détectée(s) — build bloqué (npm audit)"
            exit 1
          fi

      - name: Compiler le frontend
        run: npm run build
        working-directory: web
        env:
          VITE_API_URL: https://cesizen-staging.example.com

  # ──────────────────────────────────────────────────────────────
  # Job 3 : Tests end-to-end (Selenium)
  # ──────────────────────────────────────────────────────────────
  e2e-tests:
    name: Tests end-to-end (Selenium)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v7

      - name: Démarrer la stack e2e (db, api, web, selenium)
        run: docker compose -f docker-compose.e2e.yml up -d --build db api web selenium

      - name: Attendre que l'API soit prête
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.e2e.yml exec -T api node -e "require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::L'API n'a pas démarré à temps"
          exit 1

      - name: Créer le compte ADMIN de test
        run: docker compose -f docker-compose.e2e.yml exec -T api npx tsx src/scripts/seed-e2e.ts

      - name: Lancer les tests Selenium
        run: docker compose -f docker-compose.e2e.yml run --rm e2e

      - name: Récupérer les logs en cas d'échec
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs

      - name: Nettoyer la stack e2e
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  # ──────────────────────────────────────────────────────────────
  # Job 4 : Audit de sécurité des images Docker (Trivy)
  # ──────────────────────────────────────────────────────────────
  docker-audit:
    name: Audit Docker — Trivy
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v7

      - name: Builder l'image API
        uses: docker/build-push-action@v7
        with:
          context: ./back
          file: ./back/Dockerfile
          push: false
          load: true
          tags: cesizen-api:audit

      - name: Builder l'image Web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./web/Dockerfile
          push: false
          load: true
          tags: cesizen-web:audit
          build-args: |
            VITE_API_URL=https://cesizen-staging.example.com

      - name: Scanner l'image API (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cesizen-api:audit
          format: json
          severity: 'LOW,MEDIUM,HIGH,CRITICAL'
          output: trivy-api.json

      - name: Scanner l'image Web (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cesizen-web:audit
          format: json
          severity: 'LOW,MEDIUM,HIGH,CRITICAL'
          output: trivy-web.json

      - name: Analyser les résultats et bloquer si high/critical
        run: |
          BLOCK=0

          for IMAGE in "API:trivy-api.json" "Web:trivy-web.json"; do
            NAME="${IMAGE%%:*}"
            FILE="${IMAGE##*:}"

            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$FILE")
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$FILE")
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' "$FILE")
            LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' "$FILE")

            {
              echo "### 🛡️ Audit Docker (Trivy) — $NAME"
              echo ""
              echo "| Sévérité | Nombre |"
              echo "|---|---|"
              echo "| 🔴 Critical | $CRITICAL |"
              echo "| 🟠 High | $HIGH |"
              echo "| 🟡 Medium | $MEDIUM |"
              echo "| 🟢 Low | $LOW |"
            } >> "$GITHUB_STEP_SUMMARY"

            if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
              BLOCK=1
            fi
          done

          if [ "$BLOCK" -eq 1 ]; then
            echo "::error::Vulnérabilité(s) high/critical détectée(s) dans une image Docker — build bloqué (Trivy)"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 5 : Build & Push des images Docker (CD — main uniquement)
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push images Docker
    runs-on: ubuntu-latest
    # Ne s'exécute que sur un push vers main (pas sur les PR ni sur develop)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-api, build-web, e2e-tests, docker-audit]
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta-api.outputs.version }}

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v7

      - name: Se connecter au GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées de l'image API
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push image API
        uses: docker/build-push-action@v7
        with:
          context: ./back
          file: ./back/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Métadonnées de l'image Web
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push image Web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            VITE_API_URL=https://${{ secrets.DOMAIN }}

  # ──────────────────────────────────────────────────────────────
  # Job 6 : Déploiement SSH sur le serveur de production (CD — main uniquement)
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Déployer sur le serveur de production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Déployer via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh "$SSH_USER@$SSH_HOST" << 'ENDSSH'
            cd /opt/cesizen
            git pull
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
          ENDSSH

      - name: Créer la release GitHub
        uses: actions/github-script@v9
        with:
          script: |
            const fullSha = context.sha;
            const sha = fullSha.substring(0, 7);
            const date = new Date().toISOString().split('T')[0].replace(/-/g, '');
            const tagName = `v1.0.0-${date}-${sha}`;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: fullSha,
            });

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `🚀 ${tagName}`,
              generate_release_notes: true,
              make_latest: "true",
            });
            console.log(`Release créée : ${release.data.html_url}`);
